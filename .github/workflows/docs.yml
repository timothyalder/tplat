name: Build and Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Bazel
        uses: bazelbuild/setup-bazelisk@v3
      - name: Build site
        run: bazel build //projects/docs:docs_site.build
      - name: Copy site output
        run: |
          mkdir site
          cp -r bazel-bin/projects/docs/docs_site.build/* site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4